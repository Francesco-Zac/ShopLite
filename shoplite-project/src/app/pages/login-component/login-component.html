<section class="page-shell">
  <div class="mx-auto flex min-h-[70vh] w-full max-w-lg items-center">
    <div class="surface-panel w-full p-8 sm:p-10">
      <div class="mb-8 space-y-3">
        <p class="page-eyebrow">Accesso riservato</p>
        <h1 class="text-3xl font-semibold text-stone-950">Login admin</h1>
        <p class="text-sm leading-6 text-stone-600">
          Accedi all'area di gestione per aggiornare catalogo e disponibilita.
        </p>
      </div>

      <form (ngSubmit)="onLogin()" class="space-y-5">
        <div class="form-field">
          <label class="form-label" for="username">Username</label>
          <input
            id="username"
            [(ngModel)]="username"
            name="username"
            type="text"
            placeholder="Inserisci username"
            required
            class="form-input"
          />
        </div>

        <div class="form-field">
          <label class="form-label" for="password">Password</label>
          <div class="relative">
            <input
              id="password"
              [(ngModel)]="password"
              name="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="Inserisci password"
              required
              class="form-input pr-24"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-semibold uppercase tracking-[0.18em] text-stone-500 hover:text-amber-700"
            >
              {{ showPassword() ? 'Nascondi' : 'Mostra' }}
            </button>
          </div>
        </div>

        @if (error()) {
          <p class="form-help">Credenziali non valide.</p>
        }

        <button type="submit" class="btn-primary w-full">Accedi</button>
      </form>
    </div>
  </div>
</section>
