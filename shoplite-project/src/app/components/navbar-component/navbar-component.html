<nav class="topbar">
  <div class="topbar__inner">
    <a class="topbar__brand" routerLink="/products">ShopLite</a>

    <div class="topbar__nav">
      <a
        routerLink="/products"
        routerLinkActive="topbar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="topbar__link"
      >
        Home
      </a>
      <a routerLink="/cart" routerLinkActive="topbar__link--active" class="topbar__link">
        Carrello
      </a>

      @if (auth.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="topbar__link--active" class="topbar__link">
          Admin
        </a>
        <button type="button" (click)="logout()" class="topbar__link">
          Logout
        </button>
      } @else {
        <a routerLink="/login" routerLinkActive="topbar__link--active" class="topbar__link">
          Login
        </a>
      }
    </div>
  </div>
</nav>
