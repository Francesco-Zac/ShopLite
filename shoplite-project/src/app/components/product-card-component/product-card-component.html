<article class="surface-card flex h-full flex-col gap-5">
  <div class="relative overflow-hidden rounded-[1.25rem] bg-stone-100">
    <img [src]="product().imageUrl" [alt]="product().name" class="h-56 w-full object-cover" />
    @if (product().quantity === 0) {
      <span class="status-badge status-badge--danger absolute right-4 top-4">Esaurito</span>
    }
  </div>

  <div class="flex flex-1 flex-col gap-3">
    <span class="page-eyebrow">{{ product().category || 'Catalogo' }}</span>
    <div>
      <h3 class="text-xl font-semibold text-stone-950">
        <a [routerLink]="['/product', product().id]" class="hover:text-amber-700">
          {{ product().name }}
        </a>
      </h3>
      <p class="mt-2 text-sm leading-6 text-stone-600">{{ product().description }}</p>
    </div>
  </div>

  <div class="mt-auto flex items-center justify-between gap-4">
    <span class="price-tag">{{ product().price | currency:'EUR':'symbol':'1.2-2' }}</span>
    <button
      data-buy-btn
      type="button"
      (click)="onAdd()"
      [appOutOfStock]="product().quantity"
      class="btn-primary"
    >
      Aggiungi
    </button>
  </div>
</article>
